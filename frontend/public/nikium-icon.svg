<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" /> <stop offset="100%" stop-color="#8B5CF6" /> </linearGradient>
    
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" /> <stop offset="100%" stop-color="#3B82F6" /> </linearGradient>
    
    <linearGradient id="beakGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" /> <stop offset="100%" stop-color="#EF4444" /> </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <polygon points="25,85 15,65 40,70" fill="url(#bodyGrad)" opacity="0.8"/>
    
    <polygon points="25,85 75,85 50,45" fill="url(#bodyGrad)" />
    
    <polygon points="35,85 65,85 50,55" fill="url(#wingGrad)" />
    
    <polygon points="65,60 75,85 90,40 80,35" fill="url(#bodyGrad)" />
    
    <polygon points="90,40 110,45 85,50" fill="url(#beakGrad)" />
  </g>
</svg>
