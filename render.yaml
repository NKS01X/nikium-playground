services:
  - type: web
    name: nikium-server
    env: go
    region: oregon
    plan: free
    rootDir: .
    buildCommand: go build -o nikium-server ./cmd/server
    startCommand: ./nikium-server
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
